name: tests

on:
  push:
    branches: [feature/embedder, main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/uv-installation@v2
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --frozen --all-extras

      - name: Run tests
        run: |
          uv run pytest tests/ -v --tb=short
